name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  checks:
    name: format, credo, unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.3'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mix.lock', 'native/moqx_native/Cargo.lock', '.moq-dev/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: mix deps.get

      - name: Run fast checks
        run: mix ci

  relay-integration:
    name: relay-backed integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check out pinned moq-dev relay workspace
        uses: actions/checkout@v6
        with:
          repository: moq-dev/moq
          ref: aae43f824b9b8d93b68dd6a765f8bec691f60c0b
          path: .moq-dev

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.0'
          otp-version: '27.3'

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
            .moq-dev/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mix.lock', 'native/moqx_native/Cargo.lock', '.moq-dev/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Build relay binary for integration tests
        run: cargo build --manifest-path .moq-dev/Cargo.toml --release -p moq-relay

      - name: Run relay-backed integration tests
        run: mix test.integration
